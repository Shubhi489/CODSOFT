<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calculator</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #eaeaea;
    font-family: Arial;
}

/* Calculator box */
.calculator {
    background: linear-gradient(135deg, #3aa0ff, #1e6ecf);
    padding: 20px;
    border-radius: 20px;
    width: 260px;
}

/* Display */
#display {
    width: 100%;
    height: 60px;
    border: none;
    border-radius: 10px;
    margin-bottom: 20px;
    font-size: 30px;
    text-align: right;
    padding-right: 10px;
}

/* Grid buttons */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

/* Buttons style */
button {
    height: 50px;
    border: none;
    border-radius: 10px;
    font-size: 20px;
    color: white;
    background: #2d7cd3;
    cursor: pointer;
}

button:hover {
    background: #1c5fa8;
}

/* Operator buttons */
.operator {
    background: #1b5fbf;
}

.equal {
    background: #0d4ea6;
}
</style>

</head>
<body>

<div class="calculator">

    <!-- Display -->
    <input type="text" id="display" value="0" readonly>

    <!-- Buttons -->
    <div class="buttons">
        <button onclick="press(7)">7</button>
        <button onclick="press(8)">8</button>
        <button onclick="press(9)">9</button>
        <button class="operator" onclick="press('+')">+</button>

        <button onclick="press(4)">4</button>
        <button onclick="press(5)">5</button>
        <button onclick="press(6)">6</button>
        <button class="operator" onclick="press('-')">-</button>

        <button onclick="press(1)">1</button>
        <button onclick="press(2)">2</button>
        <button onclick="press(3)">3</button>
        <button class="operator" onclick="calculate()">=</button>

        <button onclick="press(0)">0</button>
        <button onclick="clearDisplay()">C</button>
        <button onclick="press('*')">*</button>
        <button onclick="press('/')">/</button>
    </div>

</div>

<script>
let display = document.getElementById("display");

/* Add number/operator */
function press(value) {
    if (display.value === "0") {
        display.value = value;
    } else {
        display.value += value;
    }
}

/* Calculate result */
function calculate() {
    try {
        display.value = eval(display.value);
    } catch {
        display.value = "Error";
    }
}

/* Clear screen */
function clearDisplay() {
    display.value = "0";
}
</script>

</body>
</html>
